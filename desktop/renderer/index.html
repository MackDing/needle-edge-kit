<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Needle Edge Kit — Demo</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      margin: 0; padding: 24px;
      background: #0d0f12; color: #e8eaed;
    }
    h1 { margin: 0 0 4px 0; font-size: 20px; }
    .sub { color: #8b9098; font-size: 12px; margin-bottom: 20px; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 11px;
              background: #2a2d31; color: #8b9098; }
    .status.ready { background: #103a1c; color: #58d68d; }
    textarea {
      width: 100%; box-sizing: border-box; background: #1a1d21; color: #e8eaed;
      border: 1px solid #2a2d31; border-radius: 6px; padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px;
    }
    .query { height: 60px; }
    .tools { height: 200px; }
    button {
      margin-top: 12px; padding: 8px 18px; background: #4f87f5; color: white;
      border: 0; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    pre {
      background: #15171b; padding: 12px; border-radius: 6px; margin-top: 12px;
      overflow-x: auto; font-size: 13px;
    }
    .latency { color: #8b9098; font-size: 11px; margin-top: 4px; }
    label { font-size: 12px; color: #8b9098; display: block; margin-bottom: 4px; margin-top: 14px; }
  </style>
</head>
<body>
  <h1>Needle Edge Kit</h1>
  <div class="sub">Local · Offline · <span id="status" class="status">loading…</span></div>

  <label>Query</label>
  <textarea id="query" class="query" placeholder="turn off all lights and play jazz"></textarea>

  <label>Tools (JSON)</label>
  <textarea id="tools" class="tools" placeholder="[ {...} ]"></textarea>

  <button id="go" disabled>Generate</button>
  <div class="latency" id="latency"></div>

  <label>Output</label>
  <pre id="output">—</pre>

  <script>
    const $ = id => document.getElementById(id);
    const status = $('status'), go = $('go');
    const sampleTools = [
      {"name":"set_light_brightness","description":"Adjust brightness 0-100","parameters":{"room":{"type":"string","enum":["living_room","bedroom","all"]},"level":{"type":"integer"}},"required":["room","level"]},
      {"name":"play_music","description":"Play music","parameters":{"genre":{"type":"string"}},"required":[]}
    ];
    $('tools').value = JSON.stringify(sampleTools, null, 2);

    window.needle.onReady(({ model }) => {
      status.textContent = `ready · ${model}`;
      status.classList.add('ready');
      go.disabled = false;
    });

    go.addEventListener('click', async () => {
      go.disabled = true;
      $('output').textContent = '…';
      const t0 = performance.now();
      try {
        const tools = JSON.parse($('tools').value);
        const calls = await window.needle.generate($('query').value, tools);
        const t1 = performance.now();

        const results = await window.needle.execute(calls);
        const t2 = performance.now();

        $('output').textContent =
          '── tool calls ──\n' + JSON.stringify(calls, null, 2) +
          '\n\n── results ──\n' + JSON.stringify(results, null, 2);
        $('latency').textContent = `infer ${(t1-t0).toFixed(0)} ms · exec ${(t2-t1).toFixed(0)} ms`;
      } catch (e) {
        $('output').textContent = `ERROR: ${e.message}`;
      } finally {
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
